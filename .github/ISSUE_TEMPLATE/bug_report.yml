name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, I expected Y but got Z..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Self-hosted (Docker)
        - Self-hosted (manual)
        - Humanly.ai (cloud)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Humanly version
      placeholder: "e.g. 1.2.0 or commit SHA"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or relevant log output.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, environment details, anything else relevant.
