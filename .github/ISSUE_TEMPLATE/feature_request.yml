name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Humanly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap this feature addresses.
      placeholder: "When testing agents for compliance use cases, I can't..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your proposed solution
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or alternative approaches you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      multiple: true
      options:
        - Evaluation engine
        - AgentConnector protocol
        - CI/CD integration
        - TypeScript SDK
        - REST API
        - Frontend / UI
        - Self-hosting / Docker
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, links — anything helpful.
